<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Browser Fingerprint Test</title>
</head>
<body>
  <h1>Testing browser-fingerprint</h1>
  <pre id="output"></pre>

  <script type="module">
    import { generateBrowserFingerprint } from '../dist/index.js';

    async function runTest() {
      try {
        const result = await generateBrowserFingerprint();
        document.getElementById('output').textContent = JSON.stringify(result, null, 2);
        console.log('Fingerprint:', result.fingerprint);
      } catch (err) {
        console.error(err);
      }
    }

    runTest();
  </script>
</body>
</html>
